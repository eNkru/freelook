<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Settings</title>
    <link href="../css/setting.css" rel="stylesheet">
</head>

<body>
<div class="container">
    <div class="notice">
        Restart the app to apply changes
    </div>

    <section>
        <h2>Zoom Level</h2>
        <input type="number" id="zoomLevel" min="0.5" max="3.0" step="0.1" value="1.0">
    </section>

    <section>
        <h2>Ads Blocker</h2>
        <div class="field">
            <input type="text" id="verticalAdsClass">
            <span class="tag">Vertical Ads Class</span>
        </div>
        <div class="field">
            <input type="text" id="smallAdsClass">
            <span class="tag">Small Ads Class</span>
        </div>
        <div class="field">
            <input type="text" id="premiumAdsClass">
            <span class="tag">Upgrade Premium Ads Class</span>
        </div>
    </section>

    <section>
        <h2>Unread Message</h2>
        <div class="field">
            <input type="text" id="unreadClass" placeholder="_3Jn_7Iv4SwMTMOPJiydZLa">
            <span class="tag">Unread Span Class</span>
        </div>
    </section>

    <section>
        <h2>Home URL</h2>
        <div class="select-wrapper">
            <select id="homepageUrl">
                <option value="" disabled>Select URL</option>
                <option value="https://outlook.live.com/mail">https://outlook.live.com/mail</option>
                <option value="https://outlook.office.com/mail">https://outlook.office.com/mail</option>
            </select>
        </div>
    </section>

    <section>
        <h2>Window Position and Size</h2>
        <button id="windowReset" class="btn btn-secondary">Reset size and position</button>
    </section>

    <hr>

    <button id="saveRestart" class="btn btn-primary">Save &amp; Restart</button>
</div>

<script type="module" src="../js/setting.js"></script>
</body>

</html>
